<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Advanced Calculator</title>\n    <link rel='stylesheet' href='styles.css'>\n</head>\n<body>\n    <div class='calculator'>\n        <div class='display' id='display'>0</div>\n        <div class='buttons'>\n            <!-- 3D styled buttons -->\n            <button class='btn' onclick='clearDisplay()'>C</button>\n            <button class='btn' onclick='appendToDisplay("7")'>7</button>\n            <button class='btn' onclick='appendToDisplay("8")'>8</button>\n            <button class='btn' onclick='appendToDisplay("9")'>9</button>\n            <button class='btn' onclick='appendToDisplay("/")'>/</button>\n            <button class='btn' onclick='appendToDisplay("4")'>4</button>\n            <button class='btn' onclick='appendToDisplay("5")'>5</button>\n            <button class='btn' onclick='appendToDisplay("6")'>6</button>\n            <button class='btn' onclick='appendToDisplay("*")'>*</button>\n            <button class='btn' onclick='appendToDisplay("1")'>1</button>\n            <button class='btn' onclick='appendToDisplay("2")'>2</button>\n            <button class='btn' onclick='appendToDisplay("3")'>3</button>\n            <button class='btn' onclick='appendToDisplay("-")'>-</button>\n            <button class='btn' onclick='appendToDisplay("0")'>0</button>\n            <button class='btn' onclick='appendToDisplay(".")'>.</button>\n            <button class='btn' onclick='calculateResult()'>=</button>\n            <button class='btn' onclick='appendToDisplay("+")'>+</button>\n        </div>\n        <div class='memory-functions'>\n            <button class='btn' onclick='saveToMemory()'>M+</button>\n            <button class='btn' onclick='clearMemory()'>MC</button>\n            <button class='btn' onclick='recallMemory()'>MR</button>\n            <button class='btn' onclick='clearHistory()'>History</button>\n        </div>\n        <div class='shape-area-calculator'>\n            <h3>Shape Area Calculator</h3>\n            <form id='shape-form'>\n                <select id='shape-select' onchange='calculateArea()'>\n                    <option value='rectangle'>Rectangle</option>\n                    <option value='circle'>Circle</option>\n                    <!-- Add more shapes as needed -->\n                </select>\n                <input type='number' id='shape-dimension1' placeholder='Dimension 1'>\n                <input type='number' id='shape-dimension2' placeholder='Dimension 2 (if applicable)'>\n                <button type='button' onclick='calculateArea()'>Calculate Area</button>\n            </form>\n            <div id='area-result'></div>\n        </div>\n        <div class='number-to-words'>\n            <h3>Number to Words Converter</h3>\n            <input type='number' id='number-input' placeholder='Enter a number'>\n            <button type='button' onclick='convertToWords()'>Convert</button>\n            <div id='words-result'></div>\n        </div>\n        <div class='equation-solver'>\n            <h3>Equation Solver</h3>\n            <input type='text' id='equation-input' placeholder='Enter equation'>\n            <button type='button' onclick='solveEquation()'>Solve</button>\n            <div id='equation-result'></div>\n        </div>\n    </div>\n    <script src='script.js'></script>\n</body>\n</html>\n
